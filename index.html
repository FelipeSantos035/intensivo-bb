function todayStr(){return new Date().toISOString().slice(0,10);}
function addDays(s,n){var d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function fmtShort(s){
  if(!s)return"";
  var p=s.split("-");var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
}
function fmtFull(s){
  if(!s)return"";
  var p=s.split("-");var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"});
}

// SMART SCHEDULER - 60 days, auto-compact if behind
function buildSchedule(){
  var today=todayStr();
  var endDate=addDays(STATE.startDate,59); // 60 days
  var daysLeft=Math.max(1,diffDays(today,endDate)+1);
  // Collect pending codes in MASTER order
  var pending=[];
  for(var i=0;i<ALL_CODES.length;i++){if(!STATE.done[ALL_CODES[i]])pending.push(ALL_CODES[i]);}
  var perDay=Math.max(2,Math.ceil(pending.length/daysLeft));
  var isCompacted=(perDay>2);
  var days=[],ci=0,dayNum=1;
  var cur=today;
  while(ci<pending.length){
    var sl=pending.slice(ci,ci+perDay);ci+=perDay;
    days.push({n:dayNum++,date:cur,codes:sl,rev:false});
    cur=addDays(cur,1);
  }
  return{days:days,endDate:endDate,isCompacted:isCompacted,perDay:perDay,
         pending:pending.length,daysLeft:daysLeft};
}

      +'<button onclick="markDone(\''+code+'\')" style="padding:5px 12px;border-radius:7px;border:1px solid rgba(22,163,74,.27);background:rgba(22,163,74,.09);color:#4ADE80;font-size:11px;font-weight:700;flex-shrink:0">Feito</button></div>';
  }
  return'<div style="background:#130707;border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:16px">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<div style="width:40px;height:40px;border-radius:11px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.27);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">(!)</div>'
    +'<div><div style="font-size:15px;font-weight:800;color:#FCA5A5">'+list.length+' pendencia'+(list.length>1?'s':'')+'</div>'
    +'<div style="font-size:11px;color:#7F1D1D">O cronograma ja redistribuiu automaticamente</div></div></div>'
    +items
    +'<div style="margin-top:12px;background:#080F1F;border:1px solid rgba(30,64,175,.2);border-radius:9px;padding:10px 12px;font-size:11px;color:#334155;line-height:1.6">O sistema redistribuiu esses conteudos nos proximos dias para garantir o cumprimento do prazo.</div></div>';
}

function renderProgress(){
  var doneCount=0;for(var i=0;i<ALL_CODES.length;i++){if(STATE.done[ALL_CODES[i]])doneCount++;}
  var pct=Math.round(doneCount/ALL_CODES.length*100);
  var html='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:14px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">'
    +'<div><div style="font-size:12px;color:#475569;font-weight:700;margin-bottom:2px">PROGRESSO GERAL</div>'
    +'<div style="font-size:28px;font-weight:900;color:#F59E0B;line-height:1">'+pct+'%</div>'
    +'<div style="font-size:11px;color:#334155;margin-top:2px">'+doneCount+' de '+ALL_CODES.length+' aulas</div></div>'
    +'<div style="width:72px;height:72px;border-radius:50%;background:conic-gradient(#F59E0B '+(pct*3.6)+'deg,#1E293B 0deg);display:flex;align-items:center;justify-content:center">'
    +'<div style="width:52px;height:52px;border-radius:50%;background:#0B1220;display:flex;align-items:center;justify-content:center;font-weight:800;color:#F59E0B;font-size:14px">'+pct+'%</div>'
    +'</div></div>';
  var pfxList=Object.keys(subjectNames);
  for(var pi=0;pi<pfxList.length;pi++){
    var pfx=pfxList[pi];
    var codes=[];for(var i=0;i<ALL_CODES.length;i++){if(getPrefix(ALL_CODES[i])===pfx)codes.push(ALL_CODES[i]);}
    if(!codes.length)continue;
    var d=0,sk=0;for(var i=0;i<codes.length;i++){if(STATE.done[codes[i]])d++;if(STATE.skipped[codes[i]])sk++;}
    var p=Math.round(d/codes.length*100);var color=subjectColors[pfx];
    html+='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:10px;padding:10px 14px;margin-bottom:6px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<div><span style="font-size:13px;font-weight:700;color:#94A3B8">'+subjectNames[pfx]+'</span>'
      +'<span style="font-size:10px;color:#334155;margin-left:7px">'+professors[pfx]+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +(sk>0?'<span style="font-size:11px;color:#EF4444;font-weight:700">'+sk+'</span>':"")
      +'<span style="font-size:12px;color:'+color+';font-weight:800">'+d+'/'+codes.length+'</span>'
      +'<span style="font-size:11px;color:#475569">'+p+'%</span>'
      +'</div></div>'
      +'<div style="background:#1E293B;border-radius:999px;height:5px;overflow:hidden">'
      +'<div style="height:100%;width:'+p+'%;background:'+color+';border-radius:999px;transition:width .4s ease"></div></div>'
      +(sk>0?'<div style="font-size:10px;color:#EF444466;margin-top:4px">'+sk+' pendentes</div>':'')+'</div>';
  }
  return html;
}

function renderRedacao(){
  var total=Object.keys(REDLOG).length;
  var notas=[];for(var k in REDLOG){if(REDLOG[k].nota!==undefined)notas.push(REDLOG[k].nota);}
  var media=notas.length>0?(notas.reduce(function(a,b){return a+b;},0)/notas.length).toFixed(1):"-";
  var sit=media==="-"?"Iniciar":parseFloat(media)>=15?"Otimo":parseFloat(media)>=10?"Bom":"Treinar mais";
  var sitC=media==="-"?"#475569":parseFloat(media)>=15?"#22C55E":parseFloat(media)>=10?"#F59E0B":"#EF4444";
  var html='<div style="font-size:15px;font-weight:800;color:#F1F5F9;margin-bottom:4px">Treino de Redacao</div>'
    +'<div style="font-size:12px;color:#475569;margin-bottom:16px">Temas reais APMBB + tendencias. Meta: 1 por semana.</div>'
    +'<div style="display:flex;gap:10px;margin-bottom:20px">'
    +'<div style="flex:1;background:#0B1220;border:1px solid #1E293B;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:#F472B6">'+total+'</div><div style="font-size:11px;color:#475569">feitas</div></div>'
    +'<div style="flex:1;background:#0B1220;border:1px solid #1E293B;border-radius:10px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:#F472B6">'+media+'</div><div style="font-size:11px;color:#475569">media pts</div></div>'
    +'<div style="flex:1;background:#0B1220;border:1px solid #1E293B;border-radius:10px;padding:12px;text-align:center"><div style="font-size:16px;font-weight:900;color:'+sitC+'">'+sit+'</div><div style="font-size:11px;color:#475569">situacao</div></div>'
    +'</div>'
    +'<div style="font-size:11px;font-weight:800;color:#F472B6;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Temas Reais APMBB</div>';
  for(var i=0;i<TEMAS.length;i++){if(TEMAS[i].real)html+=renderTemaCard(i);}
  html+='<div style="font-size:11px;font-weight:800;color:#A78BFA;letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px">Temas Tendencia</div>';
  for(var i=0;i<TEMAS.length;i++){if(!TEMAS[i].real)html+=renderTemaCard(i);}
  html+='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:12px;padding:16px;margin-top:16px">'
    +'<div style="font-size:13px;font-weight:800;color:#F1F5F9;margin-bottom:12px">Registrar Redacao Feita</div>'
    +'<div style="font-size:11px;color:#475569;margin-bottom:6px">Tema que voce treinou</div>'
    +'<input id="rtema" placeholder="Descreva o tema..." style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#070D1A;color:#F1F5F9;font-size:13px;outline:none;margin-bottom:10px;box-sizing:border-box">'
    +'<div style="font-size:11px;color:#475569;margin-bottom:6px">Nota (0 a 20)</div>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">'
    +'<input id="rnota" type="range" min="0" max="20" value="10" oninput="el(\'rval\').textContent=this.value" style="flex:1;accent-color:#F472B6">'
    +'<span id="rval" style="font-size:18px;font-weight:900;color:#F472B6;min-width:28px;text-align:center">10</span>'
    +'</div>'
    +'<button onclick="registrarRed()" style="width:100%;padding:12px;border-radius:9px;border:none;background:#F472B6;color:#000;font-size:13px;font-weight:800">Registrar</button>'
    +'</div>';
  return html;
}

function renderTemaCard(i){
  var t=TEMAS[i];var cor=t.real?"#F472B6":"#A78BFA";
  return'<div style="background:#0B1220;border:1px solid '+cor+'22;border-radius:10px;padding:12px;margin-bottom:8px">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
    +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#E2E8F0;line-height:1.4;margin-bottom:4px">'+t.t+'</div>'
    +'<div style="font-size:10px;color:'+cor+'88;font-weight:600">'+t.a+'</div></div>'
    +'<button onclick="usarTema('+i+')" style="padding:4px 10px;border-radius:6px;border:1px solid '+cor+'44;background:'+cor+'15;color:'+cor+';font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">Usar</button>'
    +'</div></div>';
}
function usarTema(i){var inp=el("rtema");if(inp){inp.value=TEMAS[i].t;inp.scrollIntoView({behavior:"smooth"});}}
function registrarRed(){
  var tema=(el("rtema")||{}).value||"";
  var nota=parseInt((el("rnota")||{}).value||"10");
  if(!tema.trim()){alert("Digite o tema!");return;}
  REDLOG[todayStr()]={tema:tema,nota:nota};saveR();renderApp();
}

function renderTaf(){
  var today=todayStr();var tlog=TAFLOG[today]||{};
  var html='<div style="font-size:15px;font-weight:800;color:#F1F5F9;margin-bottom:4px">Treino Fisico - TAF</div>'
    +'<div style="font-size:12px;color:#475569;margin-bottom:16px">Registre seus treinos e acompanhe a evolucao em relacao as metas do TAF.</div>'
    +'<div style="background:#0B1220;border:1px solid #1E293B;border-radius:12px;padding:14px;margin-bottom:16px">'
    +'<div style="font-size:11px;color:#475569;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Status Hoje</div>';
  for(var i=0;i<TAF.length;i++){
    var ex=TAF[i];var val=tlog[ex.id];
    var has=(val!==undefined&&val!==null&&val!=="");
    var passed=has&&(ex.less?parseFloat(val)<=ex.meta:parseFloat(val)>=ex.meta);
    var color=!has?"#334155":passed?"#22C55E":"#EF4444";
    var pct=!has?0:ex.less?Math.min(100,Math.round(ex.meta/Math.max(parseFloat(val),0.1)*100)):Math.min(100,Math.round(parseFloat(val)/ex.meta*100));
    var metaStr=ex.id==="corrida"?"12:00min":ex.meta+(ex.unit==="seg"?"s":" reps");
    html+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
      +'<span style="font-size:13px;color:#94A3B8">'+ex.name+'</span>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:11px;color:#475569">Meta: <strong style="color:#F59E0B">'+metaStr+'</strong></span>'
      +(has?'<span style="font-size:12px;font-weight:800;color:'+color+'">'+val+(ex.unit==="seg"?"s":"")+(passed?" OK":" NOK")+'</span>':'<span style="font-size:11px;color:#334155">nao registrado</span>')
      +'</div></div>'
      +'<div style="background:#1E293B;border-radius:999px;height:4px;overflow:hidden">'
      +'<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:999px;transition:width .4s ease"></div></div></div>';
  }
  html+='</div>';
  html+='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:12px;padding:14px;margin-bottom:16px">'
    +'<div style="font-size:13px;font-weight:800;color:#F1F5F9;margin-bottom:12px">Registrar Treino de Hoje</div>';
  for(var i=0;i<TAF.length;i++){
    var ex=TAF[i];var cur=tlog[ex.id]||"";
    var metaStr=ex.id==="corrida"?"12min = 720s":ex.meta+(ex.unit==="seg"?"s":" reps");
    html+='<div style="margin-bottom:10px">'
      +'<label style="font-size:11px;color:#475569;font-weight:600;display:block;margin-bottom:4px">'+ex.name+' (meta: '+metaStr+')</label>'
      +'<input id="taf-'+ex.id+'" type="number" value="'+cur+'" placeholder="'+(ex.unit==="seg"?"segundos":"repeticoes")+'" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #334155;background:#070D1A;color:#F1F5F9;font-size:14px;outline:none;box-sizing:border-box"></div>';
  }
  html+='<button onclick="salvarTaf()" style="width:100%;padding:12px;border-radius:9px;border:none;background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;font-size:13px;font-weight:800;margin-top:4px">Salvar Treino</button></div>';
  var keys=Object.keys(TAFLOG).sort().reverse().slice(0,7);
  if(keys.length>0){
    html+='<div style="font-size:11px;font-weight:800;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Historico (ultimos 7)</div>';
    for(var li=0;li<keys.length;li++){
      var dk=keys[li];var dlog=TAFLOG[dk];var sc=[];
      for(var i=0;i<TAF.length;i++){
        var ex=TAF[i];var v=dlog[ex.id];
        if(v!==undefined&&v!==""){sc.push((ex.less?parseFloat(v)<=ex.meta:parseFloat(v)>=ex.meta)?"OK":"X");}
      }
      html+='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">'
        +'<span style="font-size:12px;color:#64748B">'+fmtShort(dk)+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:#94A3B8;letter-spacing:2px">'+sc.join(" | ")+'</span></div>';
    }
  }
  html+='<div style="background:#0A1220;border:1px solid #1E40AF33;border-radius:10px;padding:12px;margin-top:8px;font-size:11px;color:#334155;line-height:1.7">'
    +'<strong style="color:#60A5FA">Dicas TAF:</strong> Treine 3x/semana. '
    +'2400m em 12min = ritmo 5min/km. '
    +'Para barra: pratique negativas diariamente. '
    +'Para flexoes: series de 10 com 30s descanso.</div>';
  return html;
}

function salvarTaf(){
  var today=todayStr();var log={};
  for(var i=0;i<TAF.length;i++){
    var inp=el("taf-"+TAF[i].id);
    if(inp&&inp.value!=="")log[TAF[i].id]=parseFloat(inp.value);
  }
  TAFLOG[today]=log;saveT();renderApp();
}

function toggleDay(n){STATE.expanded[n]=!STATE.expanded[n];save();renderApp();}
function markDone(c){STATE.done[c]=true;delete STATE.skipped[c];save();renderApp();}
function markSkip(c){if(STATE.skipped[c]){delete STATE.skipped[c];}else{STATE.skipped[c]=true;delete STATE.done[c];}save();renderApp();}

function pedirPermissaoNotificacao(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default"){
    Notification.requestPermission(function(p){
      if(p==="granted"){try{localStorage.setItem("notif","1");}catch(e){}renderApp();}
    });
  }
}

function dispararNotificacaoSeNecessario(){
  if(!STATE.startDate)return;
  if(!("Notification" in window))return;
  if(Notification.permission!=="granted")return;
  var hoje=todayStr();
  var ultima=null;
  try{ultima=localStorage.getItem("ultimaNotif");}catch(e){}
  if(ultima===hoje)return;
  var sched=buildSchedule();
  var msg="";
  if(sched.daysLeft<=7){
    msg="URGENTE: "+sched.daysLeft+" dias para a prova! "+sched.pending+" conteudos restantes!";
  } else if(sched.isCompacted){
    msg="Atencao: "+sched.perDay+" materias hoje para cumprir o prazo. Forca!";
  } else {
    var opts=["Hora de estudar! "+sched.pending+" conteudos restantes. Foco!",
              sched.daysLeft+" dias para a prova. Cada aula conta!",
              "Consistencia bate talento. Estuda hoje!",
              "Nao esquece do treino fisico tambem. TAF exige preparo!"];
    msg=opts[Math.floor(Math.random()*opts.length)];
  }
  try{new Notification("Intensivo BB 2026",{body:msg});localStorage.setItem("ultimaNotif",hoje);}catch(e){}
}

function renderNotificacoes(){
  var perm=("Notification" in window)?Notification.permission:"unsupported";
  var html='<div style="font-size:15px;font-weight:800;color:#F1F5F9;margin-bottom:4px">Lembretes Diarios</div>'
    +'<div style="font-size:12px;color:#475569;margin-bottom:16px">Receba um aviso todo dia para nao esquecer de estudar.</div>';
  if(perm==="unsupported"){
    return html+'<div style="background:#0B1220;border:1px solid #334155;border-radius:12px;padding:16px;font-size:12px;color:#475569">Seu navegador nao suporta notificacoes. Salve o app na tela inicial e abra por la.</div>';
  }
  if(perm==="granted"){
    html+='<div style="background:#052e16;border:1px solid #22C55E44;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">'
      +'<div style="font-size:24px">&#9989;</div>'
      +'<div><div style="font-size:13px;font-weight:800;color:#22C55E">Lembretes ativados!</div>'
      +'<div style="font-size:11px;color:#4D7C0F;margin-top:2px">Voce recebera um aviso diario ao abrir o app.</div></div></div>';
  } else if(perm==="denied"){
    html+='<div style="background:#130707;border:1px solid #EF444433;border-radius:12px;padding:16px;margin-bottom:16px">'
      +'<div style="font-size:13px;font-weight:800;color:#FCA5A5;margin-bottom:6px">Notificacoes bloqueadas</div>'
      +'<div style="font-size:12px;color:#7F1D1D;line-height:1.6">Va em Configuracoes do iPhone > Safari > Notificacoes > Permitir.</div></div>';
  } else {
    html+='<div style="background:#0B1220;border:1px solid #1E293B;border-radius:12px;padding:16px;margin-bottom:16px">'
      +'<div style="font-size:13px;font-weight:800;color:#F1F5F9;margin-bottom:8px">Ativar lembretes diarios</div>'
      +'<div style="font-size:12px;color:#475569;margin-bottom:14px;line-height:1.6">O app vai te avisar todo dia com mensagem baseada no seu progresso e dias restantes.</div>'
      +'<button onclick="pedirPermissaoNotificacao()" style="width:100%;padding:12px;border-radius:9px;border:none;background:linear-gradient(135deg,#3B82F6,#6366F1);color:#fff;font-size:13px;font-weight:800">Ativar Lembretes</button>'
      +'</div>';
  }
  html+='<div style="font-size:11px;font-weight:800;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Exemplos de mensagens</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'
    +'<div style="background:#0B1220;border:1px solid #F59E0B22;border-radius:10px;padding:10px 12px;font-size:12px;color:#64748B">Hora de estudar! 80 conteudos restantes. Foco Barro Branco!</div>'
    +'<div style="background:#0B1220;border:1px solid #A3E63522;border-radius:10px;padding:10px 12px;font-size:12px;color:#64748B">Atencao: 3 materias hoje para cumprir o prazo. Forca!</div>'
    +'<div style="background:#0B1220;border:1px solid #EF444422;border-radius:10px;padding:10px 12px;font-size:12px;color:#64748B">URGENTE: 7 dias para a prova! 15 conteudos restantes!</div>'
    +'<div style="background:#0B1220;border:1px solid #22C55E22;border-radius:10px;padding:10px 12px;font-size:12px;color:#64748B">Nao esquece do treino fisico tambem. TAF exige preparo!</div>'
    +'</div>'
    +'<div style="background:#0A1220;border:1px solid #1E40AF33;border-radius:10px;padding:12px;margin-top:16px;font-size:11px;color:#334155;line-height:1.7">'
    +'<strong style="color:#60A5FA">iPhone:</strong> Salve o app na tela inicial (Compartilhar > Adicionar a Tela de Inicio) para receber notificacoes mesmo com o Safari fechado.</div>';
  return html;
}

function tentarNotificar(){
  try{dispararNotificacaoSeNecessario();}catch(e){}
}

tentarNotificar();
render();

</script>
</body>
</html>
